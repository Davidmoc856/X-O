<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saint Tower - Arcade</title>
    <link rel="stylesheet" href="saint.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="stats-bar">
            <span>Height: <b id="score-val">0</b></span>
        </div>
        
        <h1>SAINT<span>-TOWER</span></h1>

        <canvas id="towerCanvas" width="400" height="500"></canvas>

        <p id="msg">TAP OR PRESS SPACE TO STACK</p>

        <div class="arcade-menu">
            <button onclick="initTower()" class="btn-primary" id="start-btn">Build System</button>
            <button onclick="location.href='saint.html'">Back</button>
        </div>
    </div>
    <script src="tower.js"></script>
</body>
</html>
