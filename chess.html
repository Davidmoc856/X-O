<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grandmaster Chess - Saint World</title>
    <link rel="stylesheet" href="saint.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>

<body>
    <div class="container puzzle-theme" style="max-width: 600px;">
        <div class="stats-bar">
            <span>Status: <b id="status">Your Turn</b></span>
        </div>

        <h1>SAINT <span>CHESS</span></h1>

        <div id="myBoard"
            style="width: 100%; margin: 20px auto; border: 4px solid var(--neon-blue); border-radius: 8px;"></div>

        <div class="arcade-menu">
            <button onclick="resetGame()" class="btn-primary">Reset Board</button>
            <button onclick="location.href='saint.html'">resign & exit</button>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="chess.js"></script>
</body>

</html>
