<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber RPS - Brain Bash Arcade</title>
<meta name="description" content="Play Rock Paper Scissors against the AI at Brain Bash Arcade.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://st-tic-tac-toe.onrender.com/">
<meta property="og:title" content="Brain Bash Arcade - Neural Link Active">
<meta property="og:description" content="Challenge the Flash-Genius AI in Chess or play multiplayer with friends. Built for the elite.">
<meta property="og:image" content="https://st-tic-tac-toe.onrender.com/preview-image.png">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="Brain Bash Arcade">
<meta property="twitter:image" content="https://st-tic-tac-toe.onrender.com/photo-2024-06-17-20-44-28.jpg">
    <link rel="stylesheet" href="saint.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="container">
        <div class="stats-bar">
            <span>Player: <b id="p-score">0</b></span>
            <span>AI: <b id="cpu-score">0</b></span>
        </div>
        
        <h1>CYBER<span>-RPS</span></h1>

        <div class="battle-arena">
            <div class="fighter" id="player-choice">?</div>
            <div class="vs">VS</div>
            <div class="fighter" id="cpu-choice">?</div>
        </div>

        <p id="result-text">SELECT YOUR WEAPON</p>

        <div class="weapon-select">
            <button onclick="play('ROCK')" class="weapon-btn">✊</button>
            <button onclick="play('PAPER')" class="weapon-btn">✋</button>
            <button onclick="play('SCISSORS')" class="weapon-btn">✌️</button>
        </div>

        <div class="arcade-menu" style="margin-top: 20px;">
            <button onclick="location.href='index.html'">Back</button>
        </div>
    </div>

    <script src="rps.js"></script>
</body>
</html>
