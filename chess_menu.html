<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Multiplayer - Menu</title>
        <title>Brain Bash Arcade | High-IQ Gaming</title>
<meta name="description" content="Play Grandmaster Chess, Snake, and more at the Brain Bash Arcade by Saint David.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://st-tic-tac-toe.onrender.com/">
<meta property="og:title" content="Brain Bash Arcade - Neural Link Active">
<meta property="og:description" content="Challenge the Flash-Genius AI in Chess or play multiplayer with friends. Built for the elite.">
<meta property="og:image" content="https://st-tic-tac-toe.onrender.com/photo-2024-06-17-20-44-28.jpg">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="Brain Bash Arcade">
<meta property="twitter:image" content="https://st-tic-tac-toe.onrender.com/photo-2024-06-17-20-44-28.jpg">
<link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        button {
            padding: 18px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-create {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-join {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-join:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 1em;
        }

        .btn-confirm {
            background: #667eea;
            color: white;
        }

        .btn-confirm:hover {
            background: #5568d3;
        }

        .btn-cancel {
            background: #ddd;
            color: #333;
        }

        .btn-cancel:hover {
            background: #ccc;
        }

        .info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            color: #666;
            font-size: 0.95em;
            border-left: 4px solid #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♟️ Chess</h1>
        <p class="subtitle">Play with a friend globally!</p>

        <div id="mainMenu" class="button-group">
            <button class="btn-create" onclick="createRoom()">Create Room</button>
            <button class="btn-join" onclick="openJoinModal()">Join Room</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Setting up your game...</p>
        </div>

        <div class="info">
            💡 Share your room code with a friend to play together!
        </div>
    </div>

    <!-- Join Room Modal -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <h2>Enter Room Code</h2>
            <input type="text" id="roomCode" placeholder="e.g., 1234" maxlength="4" inputmode="numeric">
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="joinRoom()">Join</button>
                <button class="btn-cancel" onclick="closeJoinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const mainMenu = document.getElementById('mainMenu');
        const loading = document.getElementById('loading');
        const joinModal = document.getElementById('joinModal');
        const roomCodeInput = document.getElementById('roomCode');

        function createRoom() {
            mainMenu.style.display = 'none';
            loading.style.display = 'block';
            console.log("Emitting createRoom event for chess...");
            socket.emit('createRoom');
        }

        function openJoinModal() {
            roomCodeInput.value = '';
            joinModal.classList.add('active');
            roomCodeInput.focus();
        }

        function closeJoinModal() {
            joinModal.classList.remove('active');
        }

        function joinRoom() {
            const code = roomCodeInput.value.trim();
            if (code.length === 4) {
                mainMenu.style.display = 'none';
                loading.style.display = 'block';
                console.log("Emitting joinRoom for code:", code);
                socket.emit('joinRoom', code);
            } else {
                alert("Please enter a valid 4-digit room code");
            }
        }

        // Handle room creation response
        socket.on('roomCreated', (roomCode) => {
            console.log("Room created:", roomCode);
            window.location.href = `chess_online.html#${roomCode}`;
        });

        // Handle join room response
        socket.on('joinSuccess', (roomCode) => {
            console.log("Joined room:", roomCode);
            window.location.href = `chess_online.html#${roomCode}`;
        });

        // Handle errors
        socket.on('error', (message) => {
            loading.style.display = 'none';
            mainMenu.style.display = 'flex';
            alert("Error: " + message);
        });

        // Allow Enter key to join
        roomCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
