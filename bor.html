<body>
    <h1>Multiplayer battle</h1>
    <div class="status-info">
    <p>Room: <span id="room-id"></span></p>
    <p id="turn-display">Waiting for opponent...</p>
</div>

<div class="board">
    <div class="cell"  id ="0"></div>
    <div class="cell" id ="1"></div>
    <div class="cell" id ="2"></div>
    <div class="cell" id ="3"></div>
    <div class="cell" id ="4"></div>
    <div class="cell" id ="5"></div>
    <div class="cell" id ="6"></div>
    <div class="cell" id ="7"></div>
    <div class="cell" id ="8"></div>
</div>




    <div id="game-over-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; flex-direction:column; justify-content:center; align-items:center; z-index:1000; font-family: sans-serif;">
    <h1 id="result-text" style="font-size: 3rem; margin-bottom: 20px;">You Won! 🎉</h1>
    <div style="display: flex; gap: 20px;">
        <button id="rematch-btn" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border: none; background: #4CAF50; color: white; font-weight: bold;">Play Again</button>
        <button id="exit-btn" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border: none; background: #f44336; color: white; font-weight: bold;">Exit Game</button>
    </div>
</div>


<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="bor.js"></script>
</body>
