<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Runner - Saint World</title>
    <link rel="stylesheet" href="saint.css">
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="stats-bar">
            <span>Score: <b id="score-val">0</b></span>
            <span>High Score: <b id="high-score">0</b></span>
        </div>
        
        <h1>NEON<span>-RUNNER</span></h1>

        <canvas id="gameCanvas" width="700" height="300"></canvas>

        <p id="msg">TAP SPACE OR SCREEN TO JUMP</p>

        <div class="arcade-menu">
            <button onclick="startGame()" class="btn-primary" id="start-btn">Start System</button>
             <button onclick="location.href='saint.html'">Back</button>
        </div>
    </div>
    <script src="runner.js"></script>
</body>
</html>
