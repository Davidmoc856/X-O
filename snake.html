<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neural Snake - Brain Bash Arcade</title>
<meta name="description" content="Play Neural Snake, the classic arcade game with a modern twist at Brain Bash Arcade.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://st-tic-tac-toe.onrender.com/">
<meta property="og:title" content="Brain Bash Arcade - Neural Link Active">
<meta property="og:description" content="Challenge the Flash-Genius AI in Chess or play multiplayer with friends. Built for the elite.">
<meta property="og:image" content="https://st-tic-tac-toe.onrender.com/preview-image.png">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="Brain Bash Arcade">
<meta property="twitter:image" content="https://st-tic-tac-toe.onrender.com/photo-2024-06-17-20-44-28.jpg">

    <link rel="stylesheet" href="saint.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="container">
        <div class="stats-bar">
            <span>Data Collected: <b id="score-val">0</b></span>
        </div>
        
        <h1>NEON<span>-SNAKE</span></h1>

        <canvas id="snakeCanvas" width="400" height="400"></canvas>

        <p id="msg">USE ARROW KEYS OR SWIPE TO NAVIGATE</p>

        <div class="level-selector" style="margin-bottom: 15px;">
    <label for="speed-select" style="color: var(--neon-blue); margin-right: 10px;">SPEED:</label>
    <select id="speed-select" style="background: #1a1a2e; color: white; border: 1px solid var(--neon-blue); padding: 5px; border-radius: 5px;">
        <option value="150">SLOW (Beginner)</option>
        <option value="100" selected>MEDIUM (Pro)</option>
        <option value="60">FAST (Cyber)</option>
    </select>
</div>

<div class="controls" id="mobile-controls">
    <div class="row">
        <button class="control-btn" onclick="setDir(0, -1)">▲</button>
    </div>
    <div class="row">
        <button class="control-btn" onclick="setDir(-1, 0)">◀</button>
        <button class="control-btn" onclick="setDir(1, 0)">▶</button>
    </div>
    <div class="row">
        <button class="control-btn" onclick="setDir(0, 1)">▼</button>
    </div>
</div>

        <div class="arcade-menu">
            <button onclick="initSnake()" class="btn-primary" id="start-btn">Initialize Stream</button>
             <button onclick="location.href='index.html'">Back</button>
        </div>
    </div>
    <script src="snake.js"></script>
</body>
</html>
